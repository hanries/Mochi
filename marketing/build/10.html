<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  .stage{ background:
    radial-gradient(95% 55% at 50% 66%, #FBC36C 0%, rgba(251,195,108,0) 58%),
    radial-gradient(120% 80% at 15% 6%, #FBD08A 0%, rgba(251,208,138,0) 50%),
    linear-gradient(160deg,#F39E47 0%, #F2697D 100%); }
  .top{ position:absolute; top:210px; left:0; right:0; text-align:center; padding:0 80px; }
  .eyebrow{ background:rgba(255,255,255,.24); color:#fff; }
  .headline{ font-size:150px; color:#fff; margin-top:46px; }
  .sub{ font-size:48px; color:rgba(255,255,255,.95); margin-top:44px; max-width:980px; margin-left:auto; margin-right:auto; }
  .mochi{ position:absolute; bottom:430px; left:50%; transform:translateX(-50%); width:720px; filter:drop-shadow(0 40px 44px rgba(120,40,40,.32)); }
  .spark{ position:absolute; color:#fff; opacity:.95; }
  .stars{ position:absolute; bottom:300px; left:0; right:0; text-align:center; color:#fff; font-size:54px; letter-spacing:6px; }
  .starsub{ position:absolute; bottom:250px; left:0; right:0; text-align:center; color:rgba(255,255,255,.92); font-size:34px; font-weight:600; }
  .cta{ position:absolute; bottom:110px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:22px;
    background:#2A1A12; color:#fff; padding:36px 64px; border-radius:100px; box-shadow:0 30px 50px -24px rgba(74,42,18,.6); }
  .cta .lab{ text-align:left; line-height:1.05; }
  .cta .lab small{ font-size:26px; opacity:.8; display:block; }
  .cta .lab big{ font-size:46px; font-weight:700; }
</style>
<div class="stage">
  <div class="top">
    <span class="eyebrow">🐹 &nbsp;Free to start</span>
    <div class="headline">Take care<br>of yourself.</div>
    <div class="sub">Keep Mochi happy. Your cozy calorie companion is waiting.</div>
  </div>

  <div class="spark" style="bottom:1180px; left:250px; font-size:80px; transform:rotate(8deg)">✦</div>
  <div class="spark" style="bottom:1280px; right:240px; font-size:56px">✦</div>
  <div class="spark" style="bottom:900px; right:300px; font-size:44px">✧</div>
  <div class="spark" style="bottom:840px; left:280px; font-size:60px">✧</div>

  <img class="mochi" src="img/mochi_ecstatic.png">

  <div class="stars">★★★★★</div>

</div>
