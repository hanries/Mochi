<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  .stage{ background:
    radial-gradient(110% 70% at 82% 8%, #E6EBD2 0%, rgba(230,235,210,0) 55%),
    linear-gradient(165deg,#F7F4E8 0%, #EDEBD4 55%, #DDE3C2 100%); }
  .top{ position:absolute; top:150px; left:96px; right:96px; }
  .eyebrow{ background:rgba(127,168,111,.2); color:#5E8A4E; }
  .headline{ font-size:140px; color:var(--textPrimary); margin-top:40px; }
  .headline .accent{ color:var(--success); }
  .sub{ font-size:44px; color:var(--textSecondary); margin-top:34px; max-width:1000px; }
  .phone-wrap{ position:absolute; left:50%; top:900px; transform:translateX(-50%); }

  .scr{ position:absolute; inset:0; background:var(--bg); padding:150px 36px 0; }
  .ph{ display:flex; align-items:center; margin-bottom:34px; }
  .ph .t{ font-size:var(--fs-large); font-weight:800; letter-spacing:-1.5px; }
  .ph .add{ margin-left:auto; color:var(--primary); font-size:48px; font-weight:600; }

  .wcard{ background:#fff; border-radius:var(--r-card); padding:44px; box-shadow:0 18px 36px -24px rgba(74,42,18,.3); }
  .whead{ display:flex; align-items:flex-start; }
  .whead .lab{ font-size:34px; font-weight:700; color:var(--textPrimary); }
  .whead .delta{ font-size:28px; color:var(--success); margin-top:8px; font-weight:600; }
  .whead .now{ margin-left:auto; font-size:54px; font-weight:800; color:var(--primary); letter-spacing:-1px; }
  .gwrap{ margin-top:30px; }
  .xlabels{ display:flex; justify-content:space-between; font-size:24px; color:var(--textSecondary); margin-top:14px; }

  .strip{ display:flex; gap:20px; margin-top:26px; }
  .scard{ flex:1; background:#fff; border-radius:30px; padding:30px 28px; box-shadow:0 14px 28px -24px rgba(74,42,18,.3); }
  .scard .k{ font-size:24px; color:var(--textSecondary); }
  .scard .v{ font-size:46px; font-weight:800; color:var(--textPrimary); margin-top:8px; letter-spacing:-1px; }
  .scard .v small{ font-size:26px; color:var(--textSecondary); font-weight:600; }
</style>
<div class="stage">
  <div class="top">
    <span class="eyebrow">📈 &nbsp;Progress, gently</span>
    <div class="headline">Watch it<br><span class="accent">all add up.</span></div>
    <div class="sub">A calm weight trend and check-ins that celebrate showing up, never the number.</div>
  </div>

  <div class="phone-wrap">
    <div class="phone"><div class="phone-screen">
      <div class="statusbar"><span>9:41</span>
        <span class="sb-icons">
          <svg viewBox="0 0 30 22" fill="currentColor"><rect x="0" y="14" width="5" height="8" rx="1.5"/><rect x="8" y="9" width="5" height="13" rx="1.5"/><rect x="16" y="4" width="5" height="18" rx="1.5"/><rect x="24" y="0" width="5" height="22" rx="1.5"/></svg>
          <svg viewBox="0 0 28 22" fill="currentColor"><path d="M14 5c4.5 0 8.6 1.8 11.6 4.7l-2.4 2.5C20.9 9.9 17.6 8.5 14 8.5S7.1 9.9 4.8 12.2L2.4 9.7C5.4 6.8 9.5 5 14 5z"/></svg>
          <svg viewBox="0 0 38 22" fill="none"><rect x="1" y="3" width="30" height="16" rx="5" stroke="currentColor" stroke-width="2" opacity=".5"/><rect x="3.5" y="5.5" width="22" height="11" rx="3" fill="currentColor"/><rect x="33" y="8" width="3" height="6" rx="1.5" fill="currentColor" opacity=".5"/></svg>
        </span>
      </div>
      <div class="scr">
        <div class="ph"><span class="t">Progress</span><span class="add">＋</span></div>

        <div class="strip">
          <div class="scard"><div class="k">Current streak</div><div class="v">12 <small>days 🔥</small></div></div>
          <div class="scard"><div class="k">Logged this month</div><div class="v">22 <small>/ 25</small></div></div>
        </div>

        <div class="wcard" style="margin-top:26px">
          <div class="whead">
            <div><div class="lab">Weight</div><div class="delta">−2.4 lb this month</div></div>
            <div class="now">171.6 lb</div>
          </div>
          <div class="gwrap">
            <svg width="100%" height="320" viewBox="0 0 688 320" preserveAspectRatio="none">
              <line x1="0" y1="40"  x2="688" y2="40"  stroke="rgba(154,123,95,.18)" stroke-width="2"/>
              <line x1="0" y1="133" x2="688" y2="133" stroke="rgba(154,123,95,.18)" stroke-width="2"/>
              <line x1="0" y1="226" x2="688" y2="226" stroke="rgba(154,123,95,.18)" stroke-width="2"/>
              <line x1="0" y1="318" x2="688" y2="318" stroke="rgba(154,123,95,.18)" stroke-width="2"/>
              <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#F29D45" stop-opacity=".22"/>
                <stop offset="1" stop-color="#F29D45" stop-opacity="0"/></linearGradient></defs>
              <path d="M0 320 L0 96 L76 110 L152 88 L228 124 L304 132 L380 150 L456 138 L532 162 L608 172 L688 184 L688 320 Z" fill="url(#g)"/>
              <path d="M0 96 L76 110 L152 88 L228 124 L304 132 L380 150 L456 138 L532 162 L608 172 L688 184"
                fill="none" stroke="#F29D45" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="688" cy="184" r="13" fill="#F29D45"/>
            </svg>
            <div class="xlabels"><span>May 26</span><span>Jun 25</span></div>
          </div>
        </div>

        <div class="wcard" style="margin-top:26px; display:flex; align-items:center; gap:30px; padding:36px 40px">
          <div style="width:108px;height:108px;border-radius:50%;background:rgba(242,157,69,.14);display:flex;align-items:center;justify-content:center;font-size:60px;flex:none">🐹</div>
          <div><div style="font-size:32px;font-weight:700;color:var(--textPrimary)">Thanks for checking in!</div>
          <div style="font-size:28px;color:var(--textSecondary);margin-top:8px;line-height:1.3">You showed up — that's the whole job.</div></div>
        </div>
      </div>
      <div class="island"></div>
    </div></div>
  </div>
</div>
