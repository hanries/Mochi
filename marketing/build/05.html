<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  .stage{ background:
    radial-gradient(110% 70% at 82% 8%, #FFE6B8 0%, rgba(255,230,184,0) 55%),
    linear-gradient(165deg,#FFF6E6 0%, #FBE9C8 58%, #F4D49C 100%); }
  .top{ position:absolute; top:150px; left:96px; right:96px; }
  .eyebrow{ background:rgba(232,162,31,.18); color:#A9711A; }
  .headline{ font-size:140px; color:var(--textPrimary); margin-top:40px; }
  .headline .accent{ color:var(--warning); }
  .sub{ font-size:44px; color:var(--textSecondary); margin-top:34px; max-width:1000px; }
  .phone-wrap{ position:absolute; left:50%; top:900px; transform:translateX(-50%); }
  .flame{ position:absolute; font-size:120px; filter:drop-shadow(0 10px 18px rgba(232,162,31,.4)); }

  .scr{ position:absolute; inset:0; background:var(--bg); padding:150px 36px 0; }
  .streakcard{ background:#fff; border-radius:var(--r-card); padding:56px 0; display:flex; align-items:center; box-shadow:0 18px 36px -24px rgba(74,42,18,.3); }
  .half{ flex:1; text-align:center; }
  .half .num{ font-size:150px; font-weight:800; letter-spacing:-4px; color:var(--textPrimary); line-height:.9; }
  .half .num .fl{ font-size:64px; }
  .half .k{ font-size:30px; color:var(--textSecondary); font-weight:500; margin-top:10px; }
  .vdiv{ width:2px; height:150px; background:rgba(154,123,95,.25); }

  .calcard{ background:#fff; border-radius:var(--r-card); padding:44px; margin-top:30px; box-shadow:0 18px 36px -24px rgba(74,42,18,.3); }
  .calcard .mt{ font-size:34px; font-weight:700; color:var(--textPrimary); margin-bottom:30px; }
  .wk{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:18px; }
  .wk span{ text-align:center; font-size:26px; color:var(--textSecondary); font-weight:500; }
  .grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:14px; }
  .cell{ aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--textPrimary); border-radius:50%; }
  .cell.lg{ background:var(--primary); color:#fff; font-weight:600; }
  .cell.td{ border:3px solid var(--primary); font-weight:600; }
  .cell.bl{ visibility:hidden; }
  .cap{ text-align:center; margin-top:38px; font-size:30px; color:var(--textSecondary); font-weight:500; }
  .cap b{ color:var(--primary); font-weight:700; }
</style>
<div class="stage">
  <div class="top">
    <span class="eyebrow">🔥 &nbsp;Streaks & habits</span>
    <div class="headline">Show up.<br>Keep the<br><span class="accent">streak.</span></div>
    <div class="sub">Every day you log lights up the calendar — tiny habits, a cozy life.</div>
  </div>
  <div class="flame" style="top:1180px; left:60px; transform:rotate(-14deg)">🔥</div>
  <div class="flame" style="top:1560px; right:58px; font-size:88px; transform:rotate(12deg)">🔥</div>

  <div class="phone-wrap">
    <div class="phone"><div class="phone-screen">
      <div class="statusbar"><span>9:41</span>
        <span class="sb-icons">
          <svg viewBox="0 0 30 22" fill="currentColor"><rect x="0" y="14" width="5" height="8" rx="1.5"/><rect x="8" y="9" width="5" height="13" rx="1.5"/><rect x="16" y="4" width="5" height="18" rx="1.5"/><rect x="24" y="0" width="5" height="22" rx="1.5"/></svg>
          <svg viewBox="0 0 28 22" fill="currentColor"><path d="M14 5c4.5 0 8.6 1.8 11.6 4.7l-2.4 2.5C20.9 9.9 17.6 8.5 14 8.5S7.1 9.9 4.8 12.2L2.4 9.7C5.4 6.8 9.5 5 14 5z"/></svg>
          <svg viewBox="0 0 38 22" fill="none"><rect x="1" y="3" width="30" height="16" rx="5" stroke="currentColor" stroke-width="2" opacity=".5"/><rect x="3.5" y="5.5" width="22" height="11" rx="3" fill="currentColor"/><rect x="33" y="8" width="3" height="6" rx="1.5" fill="currentColor" opacity=".5"/></svg>
        </span>
      </div>
      <div class="scr">
        <div class="streakcard">
          <div class="half"><div class="num">12<span class="fl">🔥</span></div><div class="k">day streak</div></div>
          <div class="vdiv"></div>
          <div class="half"><div class="num">21</div><div class="k">best streak</div></div>
        </div>
        <div class="calcard">
          <div class="mt">June 2026</div>
          <div class="wk"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
          <div class="grid">
            <span class="cell bl">x</span>
            <span class="cell lg">1</span><span class="cell lg">2</span><span class="cell lg">3</span><span class="cell lg">4</span><span class="cell lg">5</span><span class="cell lg">6</span>
            <span class="cell lg">7</span><span class="cell lg">8</span><span class="cell">9</span><span class="cell lg">10</span><span class="cell lg">11</span><span class="cell">12</span><span class="cell">13</span>
            <span class="cell lg">14</span><span class="cell lg">15</span><span class="cell lg">16</span><span class="cell lg">17</span><span class="cell lg">18</span><span class="cell lg">19</span><span class="cell lg">20</span>
            <span class="cell lg">21</span><span class="cell lg">22</span><span class="cell lg">23</span><span class="cell lg">24</span><span class="cell lg">25</span><span class="cell">26</span><span class="cell">27</span>
            <span class="cell">28</span><span class="cell">29</span><span class="cell">30</span>
          </div>
          <div class="cap">You've logged <b>22 of 25 days</b> this month 🌱</div>
        </div>
      </div>
      <div class="island"></div>
    </div></div>
  </div>
</div>
