<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  .stage{ background:
    radial-gradient(120% 80% at 80% 8%, #FFE9C9 0%, rgba(255,233,201,0) 55%),
    radial-gradient(120% 90% at 10% 95%, #FBD3B0 0%, rgba(251,211,176,0) 50%),
    linear-gradient(165deg,#FFF6EA 0%, #FBE6CC 55%, #F6CFA0 100%); }
  .top{ position:absolute; top:150px; left:96px; right:96px; }
  .eyebrow{ background:rgba(242,157,69,.16); color:#B96E22; }
  .headline{ font-size:138px; color:var(--textPrimary); margin-top:40px; }
  .headline .accent{ color:var(--primary); }
  .sub{ font-size:44px; color:var(--textSecondary); margin-top:34px; max-width:1010px; }
  .phone-wrap{ position:absolute; left:50%; top:900px; transform:translateX(-50%); }

  /* ---- Home screen ---- */
  .home{ position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg); }
  .scene{ position:relative; flex:1;
    background:url('img/habitat_day.png') bottom center / cover no-repeat; }
  .streakchip{ position:absolute; top:150px; right:40px; display:flex; align-items:center; gap:10px;
    background:#fff; padding:16px 26px; border-radius:100px; box-shadow:0 10px 24px -12px rgba(74,42,18,.4);
    font-size:28px; font-weight:600; color:var(--textPrimary); }
  .mochi{ position:absolute; bottom:30px; left:50%; transform:translateX(-50%); width:464px; filter:drop-shadow(0 24px 22px rgba(74,42,18,.28)); }
  .bubble{ position:absolute; top:330px; left:50%; transform:translateX(-50%);
    background:#fff; border:1.5px solid rgba(154,123,95,.25); border-radius:34px;
    padding:26px 36px; font-size:32px; font-weight:500; color:var(--textPrimary);
    box-shadow:0 14px 30px -16px rgba(74,42,18,.35); white-space:nowrap; }
  .bubble:after{ content:""; position:absolute; bottom:-17px; left:50%; transform:translateX(-50%);
    border-left:18px solid transparent; border-right:18px solid transparent; border-top:18px solid #fff; }
  .actions{ padding:0 50px 44px; }
  .btn-primary{ display:flex; align-items:center; justify-content:center; gap:18px;
    background:var(--primary); color:#fff; font-size:36px; font-weight:600;
    padding:38px; border-radius:var(--r-btn); box-shadow:0 18px 34px -16px rgba(242,157,69,.7); }
  .moreways{ display:flex; align-items:center; justify-content:center; gap:14px; margin:26px auto 0; width:max-content;
    background:#fff; border:3px solid rgba(242,157,69,.32); color:var(--primary);
    font-size:30px; font-weight:600; padding:18px 34px; border-radius:100px; }
  .calcard{ margin-top:30px; background:#fff; border-radius:var(--r-card); padding:38px;
    box-shadow:0 18px 36px -24px rgba(74,42,18,.30); }
  .calrow{ display:flex; align-items:baseline; gap:16px; }
  .calrow .big{ font-size:48px; font-weight:700; color:var(--textPrimary); }
  .calrow .small{ font-size:28px; color:var(--textSecondary); }
  .calrow .chev{ margin-left:auto; }
  .track{ height:14px; background:var(--surface); border-radius:100px; margin:26px 0; overflow:hidden; }
  .track>div{ height:100%; width:69%; background:var(--primary); border-radius:100px; }
  .macros{ display:flex; gap:40px; }
  .macros .m{ display:flex; align-items:center; gap:12px; font-size:28px; color:var(--textSecondary); font-weight:500; }
  .dot{ width:18px; height:18px; border-radius:50%; }
  svg.ic{ width:34px; height:34px; }
</style>
<div class="stage">
  <div class="top">
    <span class="eyebrow">🐹 &nbsp;A kinder way to track</span>
    <div class="headline">Meet Mochi,<br>your cozy<br><span class="accent">food buddy.</span></div>
    <div class="sub">Tracking that feels like caring for a friend — not grading yourself.</div>
  </div>

  <div class="phone-wrap">
    <div class="phone"><div class="phone-screen">
      <div class="statusbar"><span>9:41</span>
        <span class="sb-icons">
          <svg viewBox="0 0 30 22" fill="currentColor"><rect x="0" y="14" width="5" height="8" rx="1.5"/><rect x="8" y="9" width="5" height="13" rx="1.5"/><rect x="16" y="4" width="5" height="18" rx="1.5"/><rect x="24" y="0" width="5" height="22" rx="1.5"/></svg>
          <svg viewBox="0 0 28 22" fill="currentColor"><path d="M14 5c4.5 0 8.6 1.8 11.6 4.7l-2.4 2.5C20.9 9.9 17.6 8.5 14 8.5S7.1 9.9 4.8 12.2L2.4 9.7C5.4 6.8 9.5 5 14 5zm0 6.4c2.6 0 5 1 6.8 2.7l-3 3.1c-1-1-2.3-1.6-3.8-1.6s-2.8.6-3.8 1.6l-3-3.1A9.7 9.7 0 0 1 14 11.4z"/></svg>
          <svg viewBox="0 0 38 22" fill="none"><rect x="1" y="3" width="30" height="16" rx="5" stroke="currentColor" stroke-width="2" opacity=".5"/><rect x="3.5" y="5.5" width="22" height="11" rx="3" fill="currentColor"/><rect x="33" y="8" width="3" height="6" rx="1.5" fill="currentColor" opacity=".5"/></svg>
        </span>
      </div>

      <div class="home">
        <div class="scene">
          <div class="streakchip">🔥 12 days</div>
          <div class="bubble">You're taking such good care of us.</div>
          <img class="mochi" src="img/mochi_happy.png">
        </div>
        <div class="actions">
          <div class="btn-primary">
            <svg class="ic" viewBox="0 0 24 24" fill="#fff"><path d="M9 3l-1.5 2H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.5L15 3H9zm3 5.5A4.5 4.5 0 1 1 7.5 13 4.5 4.5 0 0 1 12 8.5z"/></svg>
            Feed Mochi · log a meal
          </div>
          <div class="moreways">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
            More ways to log
          </div>
          <div class="calcard">
            <div class="calrow"><span class="big">1,240</span><span class="small">/ 1,800 kcal</span>
              <svg class="ic chev" viewBox="0 0 24 24" fill="none" stroke="var(--textSecondary)" stroke-width="2.5"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="track"><div></div></div>
            <div class="macros">
              <span class="m"><span class="dot" style="background:var(--success)"></span>P 86g</span>
              <span class="m"><span class="dot" style="background:var(--warning)"></span>C 132g</span>
              <span class="m"><span class="dot" style="background:var(--accent)"></span>F 41g</span>
            </div>
          </div>
        </div>
      </div>
      <div class="island"></div>
    </div></div>
  </div>
</div>
