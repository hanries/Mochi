<!doctype html><meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  .stage{ background:
    radial-gradient(90% 50% at 75% 4%, #F7B24E 0%, rgba(247,178,78,0) 50%),
    linear-gradient(170deg,#F39B5A 0%, #B5638C 42%, #4A3B6B 74%, #2A2440 100%); }
  .top{ position:absolute; top:160px; left:0; right:0; text-align:center; padding:0 80px; }
  .eyebrow{ background:rgba(255,255,255,.2); color:#fff; }
  .headline{ font-size:124px; color:#fff; margin-top:40px; }
  .sub{ font-size:44px; color:rgba(255,255,255,.9); margin-top:34px; max-width:1000px; margin-left:auto; margin-right:auto; }

  .duo{ position:absolute; top:1000px; left:50%; transform:translateX(-50%); width:1290px; height:1700px; }
  .mp{ position:absolute; width:560px; height:1176px;
    background:linear-gradient(150deg,#3a3a3c,#1c1c1e 40%,#2c2c2e); border-radius:84px; padding:16px;
    box-shadow:0 60px 90px -36px rgba(20,12,30,.7); }
  .mp .mscreen{ position:relative; width:528px; height:1144px; border-radius:70px; overflow:hidden; }
  .mp .mi{ position:absolute; top:26px; left:50%; transform:translateX(-50%); width:160px; height:42px; background:#000; border-radius:30px; z-index:5; }
  .sb{ position:absolute; top:36px; left:44px; right:44px; display:flex; justify-content:space-between; z-index:4; font-size:24px; font-weight:600; }
  .chip{ position:absolute; top:120px; right:30px; background:rgba(255,255,255,.92); border-radius:100px; padding:12px 22px; font-size:23px; font-weight:600; color:var(--textPrimary); z-index:4; }
  .scene{ position:absolute; inset:0; background-position:bottom center; background-size:cover; background-repeat:no-repeat; }
  .mochi{ position:absolute; bottom:60px; left:50%; transform:translateX(-50%); width:330px; filter:drop-shadow(0 18px 16px rgba(0,0,0,.3)); }
  .bub{ position:absolute; top:280px; left:50%; transform:translateX(-50%); background:#fff; border-radius:28px; padding:20px 30px; font-size:27px; font-weight:500; color:var(--textPrimary); white-space:nowrap; box-shadow:0 14px 26px -16px rgba(0,0,0,.4); z-index:4; }
  .bub:after{ content:""; position:absolute; bottom:-14px; left:50%; transform:translateX(-50%); border-left:14px solid transparent; border-right:14px solid transparent; border-top:14px solid #fff; }
  .left{ left:70px; top:120px; transform:rotate(-6deg); }
  .right{ right:70px; top:300px; transform:rotate(6deg); }
  .day .sb{ color:var(--textPrimary); }
  .night .sb{ color:#fff; }
  .z{ position:absolute; color:#fff; opacity:.85; font-weight:800; z-index:4; }
  .tagline{ position:absolute; bottom:70px; left:0; right:0; text-align:center; color:rgba(255,255,255,.85); font-size:36px; font-weight:600; }
</style>
<div class="stage">
  <div class="top">
    <span class="eyebrow">🌗 &nbsp;A living little world</span>
    <div class="headline">A home that wakes<br>and sleeps with you.</div>
    <div class="sub">Mochi's room glows by day and dims at night — alive every time you visit.</div>
  </div>

  <div class="duo">
    <!-- DAY -->
    <div class="mp left day"><div class="mscreen">
      <div class="scene" style="background-image:url('img/habitat_day.png')"></div>
      <div class="mi"></div>
      <div class="sb"><span>9:41</span><span>🔋</span></div>
      <div class="chip">🔥 12 days</div>
      <div class="bub">It's a good day to be a hamster.</div>
      <img class="mochi" src="img/mochi_happy.png">
    </div></div>
    <!-- NIGHT -->
    <div class="mp right night"><div class="mscreen">
      <div class="scene" style="background-image:url('img/habitat_night.png')"></div>
      <div class="mi"></div>
      <div class="sb"><span>10:32</span><span>🔋</span></div>
      <div class="bub">The evening is so peaceful, isn't it?</div>
      <span class="z" style="top:300px; right:120px; font-size:40px">z</span>
      <span class="z" style="top:250px; right:90px; font-size:58px">z</span>
      <span class="z" style="top:190px; right:60px; font-size:78px">Z</span>
      <img class="mochi" src="img/mochi_sleepy.png">
    </div></div>
  </div>
</div>
